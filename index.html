<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#061018" />
    <title>Gesture Fighter Three</title>
  </head>
  <body>
    <div id="app">
      <canvas id="game"></canvas>
      <canvas id="gestureTrail" aria-label="Zona de gestos"></canvas>
      <div class="topHud">
        <div class="fighterHud playerHud">
          <span class="hudName">TÚ</span>
          <div class="hp"><span id="playerHp"></span></div>
          <div class="energy"><span id="playerEnergy"></span></div>
        </div>
        <div class="roundTitle">
          <b>GESTURE FIGHTER</b>
          <span id="roundState">Combos por gestos · movimiento por taps</span>
        </div>
        <div class="fighterHud enemyHud">
          <span class="hudName">RIVAL</span>
          <div class="hp enemy"><span id="enemyHp"></span></div>
        </div>
      </div>
      <section class="gesturePanel">
        <div>
          <strong id="gestureName">Dibuja un gesto</strong>
          <span id="gestureMeta">Tap lateral mueve · tap contrario para · línea corta dash · mantener bloquea · dibuja combos</span>
        </div>
        <button id="resetBtn" type="button">Reset</button>
      </section>
      <aside class="helpPanel">
        <div class="guideHeader">
          <h1>Gestos de pelea</h1>
          <span id="liveRead">Listo</span>
        </div>
        <div class="moveGrid" id="moveGuide" aria-label="Guía de gestos"></div>
        <div class="comboBox">
          <b>Registro</b>
          <ol id="comboLog"></ol>
        </div>
      </aside>
      <aside class="debugPanel">
        <b>Recognizer</b>
        <pre id="debugText">points: 0</pre>
      </aside>
      <div id="toast" class="toast hidden"></div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
